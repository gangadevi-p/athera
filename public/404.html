<!DOCTYPE html>
<html>
<head>
  <script>
    const path = window.location.pathname.slice(1);
    const search = window.location.search;
    const hash = window.location.hash;
    const base = '/athera';
    window.location.replace(base + '/?p=/' + encodeURIComponent(path) + search + hash);
  </script>
</head>
</html>
